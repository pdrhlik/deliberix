<ion-header>
  <ion-toolbar>
    <ion-title>{{ "auth.register" | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="auth-container">
    <h1 class="auth-title">{{ "common.app-name" | translate }}</h1>

    <form #f="ngForm" (ngSubmit)="onSubmit(f)" class="auth-form">
      <ion-input
        type="text"
        labelPlacement="stacked"
        mode="md"
        fill="outline"
        [(ngModel)]="name"
        name="name"
        required
        nonBlank
        [label]="'auth.name' | translate"
      ></ion-input>

      <ion-input
        type="email"
        labelPlacement="stacked"
        mode="md"
        fill="outline"
        [(ngModel)]="email"
        name="email"
        email
        required
        [label]="'auth.email' | translate"
      ></ion-input>

      <ion-input
        type="password"
        labelPlacement="stacked"
        mode="md"
        fill="outline"
        [(ngModel)]="password"
        name="password"
        required
        minlength="8"
        [label]="'auth.password' | translate"
      ></ion-input>

      <ion-input
        type="password"
        labelPlacement="stacked"
        mode="md"
        fill="outline"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        required
        [matches]="password"
        [label]="'auth.confirm-password' | translate"
      ></ion-input>

      <ion-button expand="block" type="submit" [disabled]="submitting()">
        @if (submitting()) {
        <ion-spinner name="crescent"></ion-spinner>
        } @else { {{ "auth.register" | translate }} }
      </ion-button>
    </form>

    <p class="auth-link">
      {{ "auth.have-account" | translate }}
      <a routerLink="/login">{{ "auth.login" | translate }}</a>
    </p>
  </div>
</ion-content>
