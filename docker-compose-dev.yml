services:
  mariadb:
    image: mariadb:12
    container_name: deliberix-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: deliberix
      MARIADB_USER: deliberix
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:3308:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - deliberix

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: deliberix-server
    restart: unless-stopped
    environment:
      DB_DSN: deliberix:${MARIADB_PASSWORD}@tcp(mariadb:3306)/deliberix?parseTime=true
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      BASE_URL: ${BASE_URL}
    volumes:
      - ./server:/app
    ports:
      - "127.0.0.1:8180:8080"
    networks:
      - deliberix
    depends_on:
      mariadb:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: deliberix-client
    restart: unless-stopped
    environment:
      API_URL: http://server:8080
    volumes:
      - ./client/src:/app/src
      - ./client/angular.json:/app/angular.json
    ports:
      - "127.0.0.1:4200:4200"
    networks:
      - deliberix
    depends_on:
      - server

  website:
    build:
      context: ./website
      dockerfile: Dockerfile.dev
    container_name: deliberix-website
    restart: unless-stopped
    environment:
      PUBLIC_APP_URL: ${BASE_URL}
    volumes:
      - ./website/src:/app/src
      - ./website/astro.config.mjs:/app/astro.config.mjs
    ports:
      - "127.0.0.1:4322:4322"
    networks:
      - deliberix

  adminer:
    image: adminer
    container_name: deliberix-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: mariadb
    ports:
      - "127.0.0.1:8081:8080"
    networks:
      - deliberix
    depends_on:
      - mariadb

networks:
  deliberix:
    driver: bridge

volumes:
  mariadb-data:
